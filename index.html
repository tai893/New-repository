<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>重力シミュレーター</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; user-select:none; }
canvas { position:fixed; top:0; left:0; }
#hud {
  position:fixed; top:16px; left:16px;
  color:rgba(255,255,255,0.8); font:13px/1.9 monospace;
  pointer-events:none; z-index:10;
  text-shadow: 0 0 8px #000;
}
#controls {
  position:fixed; top:16px; right:16px; z-index:10;
  display:flex; flex-direction:column; gap:8px; align-items:flex-end;
}
button {
  background:rgba(30,30,60,0.85); color:#fff;
  border:1px solid rgba(120,120,255,0.4); padding:8px 18px;
  border-radius:20px; cursor:pointer; font:13px monospace;
  transition:background .15s;
}
button:hover { background:rgba(80,80,180,0.8); }
#tip {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.55); font:13px monospace; pointer-events:none;
  z-index:10; text-shadow:0 0 6px #000;
}
</style>
</head>
<body>
<canvas id="trail"></canvas>
<canvas id="c"></canvas>
<div id="hud"><div id="info"></div></div>
<div id="controls">
  <button onclick="addBlackHole()">🕳 ブラックホール</button>
  <button onclick="scatter()">💫 ランダム散布</button>
  <button onclick="bodies=[]; explosions=[]; clearTrail()">🗑 全消去</button>
  <button onclick="toggleTrail()">〰 軌跡 ON/OFF</button>
  <button onclick="G=G===200?800:200" id="gbtn">⚡ 重力 切替</button>
</div>
<div id="tip">クリック＆ドラッグで星を投げる ／ スクロールで質量変更</div>

<script>
const c    = document.getElementById('c');
const ctx  = c.getContext('2d');
const tc   = document.getElementById('trail');
const tctx = tc.getContext('2d');

let W, H;
function resize() {
  W = c.width = tc.width = window.innerWidth;
  H = c.height = tc.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function clearTrail() { tctx.clearRect(0,0,W,H); }

let G = 200;
let showTrail = true;
let bodies = [], explosions = [], idSeq = 0;

const PAL = [
  ['#4fc3f7','#0288d1'],['#ff6b6b','#c0392b'],['#6bcb77','#27ae60'],
  ['#ffd93d','#e67e22'],['#c77dff','#7b2d8b'],['#4ecdc4','#1a7a74'],
  ['#ff8fab','#c2185b'],['#f9f871','#8d6e00'],
];

class Body {
  constructor(x,y,vx,vy,mass,bh=false){
    this.id=idSeq++; this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.mass=mass; this.isBlackHole=bh;
    const p=PAL[this.id%PAL.length];
    this.color=bh?'#9933ff':p[0]; this.rim=bh?'#330066':p[1];
    this.age=0;
  }
  get radius(){ return this.isBlackHole ? Math.cbrt(this.mass)*2.2 : Math.cbrt(this.mass)*1.6; }
}

function addBlackHole(){
  bodies.push(new Body(
    Math.random()*W*.8+W*.1, Math.random()*H*.8+H*.1,
    (Math.random()-.5)*30,(Math.random()-.5)*30, 4000, true));
}
function scatter(){
  for(let i=0;i<12;i++)
    bodies.push(new Body(
      Math.random()*W*.8+W*.1, Math.random()*H*.8+H*.1,
      (Math.random()-.5)*60,(Math.random()-.5)*60,
      80+Math.random()*200));
}
function toggleTrail(){ showTrail=!showTrail; if(!showTrail) clearTrail(); }

scatter();

// drag
let drag=null, pendingMass=150;
window.addEventListener('wheel', e=>{
  pendingMass=Math.max(20,Math.min(8000,pendingMass*(e.deltaY>0?.85:1.18)));
});
c.addEventListener('mousedown', e=>{ drag={x:e.clientX,y:e.clientY}; });
c.addEventListener('mousemove', e=>{ if(drag){drag.ex=e.clientX;drag.ey=e.clientY;} });
c.addEventListener('mouseup',   e=>{
  if(!drag)return;
  bodies.push(new Body(drag.x,drag.y,(e.clientX-drag.x)*2.5,(e.clientY-drag.y)*2.5,pendingMass));
  drag=null;
});
c.addEventListener('mouseleave',()=>{ drag=null; });
c.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.touches[0]; drag={x:t.clientX,y:t.clientY}; },{passive:false});
c.addEventListener('touchmove',  e=>{ e.preventDefault(); const t=e.touches[0]; if(drag){drag.ex=t.clientX;drag.ey=t.clientY;} },{passive:false});
c.addEventListener('touchend',   e=>{
  e.preventDefault();
  if(!drag||!drag.ex){drag=null;return;}
  bodies.push(new Body(drag.x,drag.y,(drag.ex-drag.x)*2.5,(drag.ey-drag.y)*2.5,pendingMass));
  drag=null;
});

// explosion
function boom(x,y,color,n=30){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=40+Math.random()*160;
    explosions.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:.012+Math.random()*.025,r:2+Math.random()*3,color});
  }
}

// physics
const DT=.016, SOFT=30;
function step(){
  for(let i=0;i<bodies.length;i++){
    let ax=0,ay=0; const bi=bodies[i];
    for(let j=0;j<bodies.length;j++){
      if(i===j)continue;
      const bj=bodies[j],dx=bj.x-bi.x,dy=bj.y-bi.y;
      const d2=dx*dx+dy*dy+SOFT*SOFT, d=Math.sqrt(d2);
      const f=G*bj.mass/d2; ax+=f*dx/d; ay+=f*dy/d;
    }
    bi.vx+=ax*DT; bi.vy+=ay*DT;
  }
  for(const b of bodies){ b.x+=b.vx*DT; b.y+=b.vy*DT; b.age++; }

  // collide
  const dead=new Set();
  for(let i=0;i<bodies.length;i++){
    if(dead.has(i))continue;
    for(let j=i+1;j<bodies.length;j++){
      if(dead.has(j))continue;
      const bi=bodies[i],bj=bodies[j];
      const dx=bj.x-bi.x,dy=bj.y-bi.y;
      if(Math.sqrt(dx*dx+dy*dy)<bi.radius+bj.radius){
        const [big,small]=bi.mass>=bj.mass?[bi,bj]:[bj,bi];
        const tot=big.mass+small.mass;
        big.vx=(big.vx*big.mass+small.vx*small.mass)/tot;
        big.vy=(big.vy*big.mass+small.vy*small.mass)/tot;
        big.mass=tot;
        if(big.mass>3000) big.isBlackHole=true;
        boom(small.x,small.y,small.color,Math.min(60,small.mass*.2|0));
        dead.add(bodies.indexOf(small));
      }
    }
  }
  bodies=bodies.filter((_,i)=>!dead.has(i))
               .filter(b=>b.x>-2000&&b.x<W+2000&&b.y>-2000&&b.y<H+2000);

  for(const p of explosions){ p.x+=p.vx*DT; p.y+=p.vy*DT; p.vx*=.97; p.vy*=.97; p.life-=p.decay; }
  explosions=explosions.filter(p=>p.life>0);
}

// draw
function drawBody(b){
  const r=b.radius;
  if(b.isBlackHole){
    // accretion disk
    const g=ctx.createRadialGradient(b.x,b.y,r*.4,b.x,b.y,r*4);
    g.addColorStop(0,'rgba(180,0,255,.7)');
    g.addColorStop(.5,'rgba(255,80,0,.3)');
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(b.x,b.y,r*4,0,Math.PI*2); ctx.fill();
    // horizon
    ctx.fillStyle='#000'; ctx.shadowColor='#aa00ff'; ctx.shadowBlur=40;
    ctx.beginPath(); ctx.arc(b.x,b.y,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // ring
    ctx.save(); ctx.translate(b.x,b.y); ctx.scale(1,.3);
    ctx.strokeStyle='rgba(180,60,255,.9)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,0,r*2.5,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    return;
  }
  // glow halo
  const g1=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,r*4);
  g1.addColorStop(0,b.color+'88'); g1.addColorStop(.4,b.color+'22'); g1.addColorStop(1,'transparent');
  ctx.fillStyle=g1; ctx.beginPath(); ctx.arc(b.x,b.y,r*4,0,Math.PI*2); ctx.fill();
  // body
  const g2=ctx.createRadialGradient(b.x-r*.3,b.y-r*.3,0,b.x,b.y,r);
  g2.addColorStop(0,'#fff'); g2.addColorStop(.35,b.color); g2.addColorStop(1,b.rim);
  ctx.shadowColor=b.color; ctx.shadowBlur=r*4;
  ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(b.x,b.y,r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

let tipA=1, lastN=0;
function render(){
  // trail layer: just slightly fade
  if(showTrail){
    tctx.globalAlpha=.03; tctx.fillStyle='#000'; tctx.fillRect(0,0,W,H); tctx.globalAlpha=1;
    for(const b of bodies){
      tctx.strokeStyle=b.color+'99'; tctx.lineWidth=1.5;
      tctx.beginPath();
      // draw last segment
      const n=20; // last N positions stored inline
      if(!b._px){ b._px=b.x; b._py=b.y; }
      tctx.moveTo(b._px,b._py); tctx.lineTo(b.x,b.y); tctx.stroke();
      b._px=b.x; b._py=b.y;
    }
  }

  // main: clear with deep space color (NOT semi-transparent)
  ctx.fillStyle='#00000f';
  ctx.fillRect(0,0,W,H);

  // drag arrow
  if(drag&&drag.ex!==undefined){
    const r=Math.cbrt(pendingMass)*1.6;
    ctx.setLineDash([5,5]); ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(drag.x,drag.y); ctx.lineTo(drag.ex,drag.ey); ctx.stroke();
    ctx.setLineDash([]);
    const ang=Math.atan2(drag.ey-drag.y,drag.ex-drag.x);
    ctx.fillStyle='rgba(255,255,255,.7)'; ctx.beginPath();
    ctx.moveTo(drag.ex,drag.ey);
    ctx.lineTo(drag.ex-14*Math.cos(ang-.4),drag.ey-14*Math.sin(ang-.4));
    ctx.lineTo(drag.ex-14*Math.cos(ang+.4),drag.ey-14*Math.sin(ang+.4));
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(drag.x,drag.y,r,0,Math.PI*2); ctx.stroke();
  } else if(drag){
    const r=Math.cbrt(pendingMass)*1.6;
    ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(drag.x,drag.y,r,0,Math.PI*2); ctx.stroke();
  }

  // explosions
  for(const p of explosions){
    ctx.globalAlpha=p.life; ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  for(const b of bodies) drawBody(b);

  // velocity hint
  for(const b of bodies){
    const s=Math.hypot(b.vx,b.vy); if(s<1)continue;
    const len=Math.min(s*.12,35);
    ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(b.x,b.y);
    ctx.lineTo(b.x+b.vx/s*len,b.y+b.vy/s*len); ctx.stroke();
  }

  // HUD
  const ke=bodies.reduce((s,b)=>s+.5*b.mass*(b.vx**2+b.vy**2),0);
  document.getElementById('info').innerHTML=
    `天体数: <b>${bodies.length}</b><br>`+
    `総質量: ${bodies.reduce((s,b)=>s+b.mass,0)|0}<br>`+
    `KE: ${(ke/1e6).toFixed(1)}M<br>`+
    `投げる質量: ${pendingMass|0}　(スクロール↕)<br>`+
    `重力 G: ${G}`;

  if(bodies.length!==lastN){tipA=1;lastN=bodies.length;}
  if(bodies.length>3) tipA=Math.max(0,tipA-.004);
  document.getElementById('tip').style.opacity=tipA;
}

function loop(){
  for(let i=0;i<3;i++) step();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
